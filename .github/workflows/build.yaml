name: Auto Build Flutter APK from Upstream Release

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1. 获取 upstream 最新 release
      - name: Get latest release
        id: latest_release
        run: |
          TAG=$(curl -s https://api.github.com/repos/15dd/hikari_novel_flutter/releases/latest | jq -r '.tag_name')
          echo "latest_tag=$TAG" >> $GITHUB_OUTPUT

      # 2. 判断是否已经发布过
      - name: Check if release exists
        id: check_release
        run: |
          TAG=${{ steps.latest_release.outputs.latest_tag }}

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG)

          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if already built
        if: steps.check_release.outputs.exists == 'true'
        run: |
          echo "Release already exists. Skip."
          exit 0

      # 3. 拉 upstream
      - name: Checkout upstream repo
        uses: actions/checkout@v5
        with:
          repository: 15dd/hikari_novel_flutter
          ref: ${{ steps.latest_release.outputs.latest_tag }}
          path: app

      # 4. Java
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      # 5. Flutter（建议锁版本）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # 6. 依赖
      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      # 7. 构建
      - name: Build APK
        working-directory: app
        run: flutter build apk --release

      # ✅ 8. 上传 Artifact（Actions 下载）
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: hikari-apk-${{ steps.latest_release.outputs.latest_tag }}
          path: app/build/app/outputs/flutter-apk/app-release.apk

      # ✅ 9. 发布 Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.latest_release.outputs.latest_tag }}
          name: hikari ${{ steps.latest_release.outputs.latest_tag }}
          files: app/build/app/outputs/flutter-apk/app-release.apk
