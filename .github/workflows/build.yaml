name: Auto Build Flutter APK from Upstream Release

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ✅ Job1：检查是否需要构建
  check:
    runs-on: ubuntu-latest
    outputs:
      latest_tag: ${{ steps.latest.outputs.latest_tag }}
      should_build: ${{ steps.check.outputs.should_build }}

    steps:
      - name: Get latest upstream release
        id: latest
        run: |
          TAG=$(curl -s https://api.github.com/repos/15dd/hikari_novel_flutter/releases/latest | jq -r '.tag_name')
          echo "latest_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if already released
        id: check
        run: |
          TAG=${{ steps.latest.outputs.latest_tag }}

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG)

          if [ "$STATUS" = "200" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "Release exists, skip build."
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "New release found, start build."
          fi

  # ✅ Job2：构建 APK
  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      # 1. 拉 upstream
      - name: Checkout upstream repo
        uses: actions/checkout@v5
        with:
          repository: 15dd/hikari_novel_flutter
          ref: ${{ needs.check.outputs.latest_tag }}
          path: app

      # 2. Java
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      # 3. Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # 4. 依赖
      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      # 🔥 5. 构建多架构 APK（重点）
      - name: Build APK (split per ABI)
        working-directory: app
        run: |
          flutter build apk --release --split-per-abi

      # 🔥 6. 额外构建 universal APK（可选但推荐）
      - name: Build Universal APK
        working-directory: app
        run: |
          flutter build apk --release

      # 7. 上传 Artifact
      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: hikari-apk-${{ needs.check.outputs.latest_tag }}
          path: |
            app/build/app/outputs/flutter-apk/*.apk

      # 8. 发布 Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.latest_tag }}
          name: hikari ${{ needs.check.outputs.latest_tag }}
          body: "自己用，不要发到其他地方。原项目地址：https://github.com/15dd/hikari_novel_flutter"
          files: app/build/app/outputs/flutter-apk/*.apk
